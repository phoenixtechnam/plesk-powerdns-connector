# Integration test environment: PowerDNS 5.0.x with PostgreSQL backend
# Usage: DOCKER_HOST=tcp://dind:2375 docker compose -f docker-compose.test-50.yml up -d
#
# PowerDNS API: http://<dind-host>:8082
# API Key: test-api-key

services:
  pdns50-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pdns
      POSTGRES_USER: pdns
      POSTGRES_PASSWORD: pdns
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdns"]
      interval: 3s
      timeout: 3s
      retries: 10

  pdns50-init:
    image: postgres:16-alpine
    depends_on:
      pdns50-db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        PGPASSWORD=pdns psql -h pdns50-db -U pdns -d pdns -c "SELECT 1 FROM domains LIMIT 1" 2>/dev/null && exit 0
        echo "Initializing PowerDNS 5.0 schema..."
        PGPASSWORD=pdns psql -h pdns50-db -U pdns -d pdns <<'SQL'
        CREATE TABLE domains (
          id                    SERIAL PRIMARY KEY,
          name                  VARCHAR(255) NOT NULL,
          master                VARCHAR(128) DEFAULT NULL,
          last_check            INT DEFAULT NULL,
          type                  VARCHAR(8) NOT NULL DEFAULT 'NATIVE',
          notified_serial       BIGINT DEFAULT NULL,
          account               VARCHAR(40) DEFAULT NULL,
          options               TEXT DEFAULT NULL,
          catalog               TEXT DEFAULT NULL,
          CONSTRAINT c_lowercase_name UNIQUE (name)
        );
        CREATE TABLE records (
          id                    BIGSERIAL PRIMARY KEY,
          domain_id             INT DEFAULT NULL,
          name                  VARCHAR(255) DEFAULT NULL,
          type                  VARCHAR(10) DEFAULT NULL,
          content               VARCHAR(65535) DEFAULT NULL,
          ttl                   INT DEFAULT NULL,
          prio                  INT DEFAULT NULL,
          disabled              BOOL DEFAULT 'f',
          ordername             VARCHAR(255),
          auth                  BOOL DEFAULT 't',
          CONSTRAINT domain_exists FOREIGN KEY(domain_id) REFERENCES domains(id) ON DELETE CASCADE
        );
        CREATE INDEX rec_name_index ON records(name);
        CREATE INDEX nametype_index ON records(domain_id,name,type);
        CREATE INDEX domain_id ON records(domain_id);
        CREATE INDEX rec_name_type ON records(name,type);
        CREATE INDEX orderindex ON records(ordername);
        CREATE TABLE supermasters (
          ip                    INET NOT NULL,
          nameserver            VARCHAR(255) NOT NULL,
          account               VARCHAR(40) NOT NULL DEFAULT ''
        );
        CREATE UNIQUE INDEX ip_nameserver_pk ON supermasters(ip, nameserver);
        CREATE TABLE comments (
          id                    SERIAL PRIMARY KEY,
          domain_id             INT NOT NULL,
          name                  VARCHAR(255) NOT NULL,
          type                  VARCHAR(10) NOT NULL,
          modified_at           INT NOT NULL,
          account               VARCHAR(40) DEFAULT NULL,
          comment               VARCHAR(65535) NOT NULL,
          CONSTRAINT domain_exists FOREIGN KEY(domain_id) REFERENCES domains(id) ON DELETE CASCADE
        );
        CREATE INDEX comments_domain_id_idx ON comments (domain_id);
        CREATE INDEX comments_name_type_idx ON comments (name, type);
        CREATE INDEX comments_order_idx ON comments (domain_id, modified_at);
        CREATE TABLE domainmetadata (
          id                    SERIAL PRIMARY KEY,
          domain_id             INT REFERENCES domains(id) ON DELETE CASCADE,
          kind                  VARCHAR(32),
          content               TEXT
        );
        CREATE INDEX domainidmetaindex ON domainmetadata(domain_id);
        CREATE TABLE cryptokeys (
          id                    SERIAL PRIMARY KEY,
          domain_id             INT REFERENCES domains(id) ON DELETE CASCADE,
          flags                 INT NOT NULL,
          active                BOOL,
          published             BOOL DEFAULT TRUE,
          content               TEXT
        );
        CREATE INDEX domainidindex ON cryptokeys(domain_id);
        CREATE TABLE tsigkeys (
          id                    SERIAL PRIMARY KEY,
          name                  VARCHAR(255),
          algorithm             VARCHAR(50),
          secret                VARCHAR(255),
          CONSTRAINT c_lowercase_name_algorithm UNIQUE (name, algorithm)
        );
        SQL
        echo "Schema initialized."

  pdns50:
    image: powerdns/pdns-auth-50:latest
    depends_on:
      pdns50-db:
        condition: service_healthy
      pdns50-init:
        condition: service_completed_successfully
    ports:
      - "8082:8081"
      - "2053:53/udp"
      - "2053:53/tcp"
    volumes:
      - ./test/pdns.conf:/etc/powerdns/pdns.conf:ro
    environment:
      PDNS_gpgsql_host: pdns50-db
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/api/v1/servers/localhost -H 'X-API-Key: test-api-key' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
