name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: json, mbstring
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPUnit
        run: ./src/plib/vendor/bin/phpunit --coverage-text

      - name: Run PHPStan
        if: matrix.php-version == '8.2'
        run: ./src/plib/vendor/bin/phpstan analyse --no-progress

      - name: Run PHP-CS-Fixer
        if: matrix.php-version == '8.2'
        run: ./src/plib/vendor/bin/php-cs-fixer fix --dry-run --diff
